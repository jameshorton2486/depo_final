<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo-Pro Unified Workspace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        legal: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            800: '#1e293b',
                            900: '#0f172a',
                            gold: '#d97706',
                            emerald: '#059669',
                            blue: '#2563eb',
                            red: '#dc2626'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Top Global Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between z-10 shrink-0">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md shadow-indigo-500/20">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">DEPO-PRO</span>
                    <span class="text-xs text-slate-500 block -mt-1 font-semibold tracking-wider">UNIFIED WORKSPACE</span>
                </div>
            </div>

            <div class="h-6 w-px bg-slate-800"></div>

            <!-- Global Layer Indicator -->
            <div class="flex items-center gap-2">
                <span id="badgeRaw" class="px-2.5 py-1 text-xs font-semibold rounded bg-slate-800 text-slate-400 border border-slate-700 flex items-center gap-1.5 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-slate-500"></span>RAW (IMMUTABLE)
                </span>
                <span id="badgeWorking" class="px-2.5 py-1 text-xs font-semibold rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 flex items-center gap-1.5 shadow-sm">
                    <span id="workingDot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>WORKING (EDITABLE)
                </span>
                <span id="badgeCertified" class="px-2.5 py-1 text-xs font-semibold rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hidden flex items-center gap-1.5 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>CERTIFIED (LOCKED)
                </span>
            </div>
        </div>

        <!-- 6-Stage Progress Indicator (Optimized) -->
        <nav class="flex items-center gap-1 bg-slate-950/80 p-1 rounded-xl border border-slate-800/80 max-w-2xl">
            <button onclick="goToStage(1)" id="stageTab1" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 shadow-sm">
                <span class="w-4 h-4 rounded-full bg-indigo-500 text-white flex items-center justify-center text-[10px] font-bold">1</span> Intake
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(2)" id="stageTab2" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">2</span> Transcripts
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(3)" id="stageTab3" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">3</span> Workspace
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(4)" id="stageTab4" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">4</span> Insertions
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(5)" id="stageTab5" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">5</span> Certify
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(6)" id="stageTab6" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800 font-semibold">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">6</span> Export
            </button>
        </nav>

        <!-- Current File State Display -->
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-xs text-slate-300 font-semibold" id="topCaseLabel">Jenkins_v_Nexus.mp3</p>
                <p class="text-[10px] text-slate-500 font-mono" id="topCaseDate">Texas UFM Compliant</p>
            </div>
            <button onclick="simulateSave()" class="p-2 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-lg text-slate-300 transition-all hover:text-white" title="Force Cloud Save">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm pointer-events-none"></div>

    <!-- MAIN INTERACTIVE SPACE -->
    <main class="flex-1 flex overflow-hidden relative font-sans">
        <div id="appRoot" class="flex-1 flex overflow-hidden"></div>
    </main>
    <!-- STATE MANAGEMENT & RUNTIME LOGIC -->
    <script src="assets/js/state.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/provenance.js"></script>
    <script src="assets/js/router.js"></script>
    <script src="assets/js/screens/stage_1.js"></script>
    <script src="assets/js/screens/stage_2.js"></script>
    <script src="assets/js/screens/stage_3.js"></script>
    <script src="assets/js/screens/stage_4.js"></script>
    <script src="assets/js/screens/stage_5.js"></script>
    <script src="assets/js/screens/stage_6.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
