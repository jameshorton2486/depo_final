<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo-Pro Unified Workspace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        serif: ['Lora', 'serif'],
                    },
                    colors: {
                        legal: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            800: '#1e293b',
                            900: '#0f172a',
                            gold: '#d97706',
                            emerald: '#059669',
                            blue: '#2563eb',
                            red: '#dc2626'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Highlight effects */
        .highlight-word-playing {
            background-color: #fef08a;
            color: #0f172a;
            border-radius: 2px;
            font-weight: 500;
        }
        .low-confidence-word {
            border-bottom: 2px dashed #f59e0b;
        }

        /* Word Document Paper Simulation */
        .ms-word-page {
            background: #ffffff !important;
            color: #1e293b !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border-radius: 2px;
            position: relative;
            font-family: 'JetBrains Mono', monospace; /* Transcripts remain monospaced */
            line-height: 2.25rem !important;
            min-height: 1056px; /* 11 inches at 96 dpi */
            padding-top: 1.5in;
            padding-bottom: 1in;
            padding-left: 1.25in;
            padding-right: 1in;
        }

        /* Marginal layout rule line simulation */
        .ufm-rule-left {
            border-right: 1px solid rgba(239, 68, 68, 0.3);
        }
        .ufm-rule-right {
            border-left: 1px solid rgba(239, 68, 68, 0.15);
        }

        /* MS Word Legal Red Margin lines for printing */
        .ms-word-redline-left {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 1.1in;
            border-left: 1px solid rgba(220, 38, 38, 0.5);
            border-right: 1px solid rgba(220, 38, 38, 0.2);
            width: 3px;
            pointer-events: none;
        }
        .ms-word-redline-right {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0.9in;
            border-left: 1px solid rgba(220, 38, 38, 0.15);
            pointer-events: none;
        }

        /* Alignment animations */
        @keyframes highlight-flash {
            0% { background-color: rgba(5, 150, 105, 0.3); }
            100% { background-color: transparent; }
        }
        .animate-flash {
            animation: highlight-flash 1.5s ease-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Top Global Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between z-10 shrink-0">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md shadow-indigo-500/20">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">DEPO-PRO</span>
                    <span class="text-xs text-slate-500 block -mt-1 font-semibold tracking-wider">UNIFIED WORKSPACE</span>
                </div>
            </div>

            <div class="h-6 w-px bg-slate-800"></div>

            <!-- Global Layer Indicator -->
            <div class="flex items-center gap-2">
                <span id="badgeRaw" class="px-2.5 py-1 text-xs font-semibold rounded bg-slate-800 text-slate-400 border border-slate-700 flex items-center gap-1.5 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-slate-500"></span>RAW (IMMUTABLE)
                </span>
                <span id="badgeWorking" class="px-2.5 py-1 text-xs font-semibold rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 flex items-center gap-1.5 shadow-sm">

                </span>
                <span id="badgeCertified" class="px-2.5 py-1 text-xs font-semibold rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hidden flex items-center gap-1.5 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>CERTIFIED (LOCKED)

        </div>

        <!-- 6-Stage Progress Indicator (Optimized) -->
        <nav class="flex items-center gap-1 bg-slate-950/80 p-1 rounded-xl border border-slate-800/80 max-w-2xl">
            <button onclick="goToStage(1)" id="stageTab1" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 shadow-sm">
                <span class="w-4 h-4 rounded-full bg-indigo-500 text-white flex items-center justify-center text-[10px] font-bold">1</span> Intake
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(2)" id="stageTab2" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">2</span> Transcripts
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(3)" id="stageTab3" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">3</span> Workspace
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(4)" id="stageTab4" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">4</span> Insertions
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(5)" id="stageTab5" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">5</span> Certify
            </button>
            <div class="text-slate-700 text-xs">→</div>
            <button onclick="goToStage(6)" id="stageTab6" class="px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800 font-semibold">
                <span class="w-4 h-4 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center text-[10px] font-bold">6</span> Export
            </button>
        </nav>

        <!-- Current File State Display -->
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-xs text-slate-300 font-semibold" id="topCaseLabel">Jenkins_v_Nexus.mp3</p>
                <p class="text-[10px] text-slate-500 font-mono" id="topCaseDate">Texas UFM Compliant</p>
            </div>
            <button onclick="simulateSave()" class="p-2 bg-slate-800 border border-slate-700 hover:bg-slate-700 rounded-lg text-slate-300 transition-all hover:text-white" title="Force Cloud Save">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm pointer-events-none"></div>

    <!-- MAIN INTERACTIVE SPACE -->
    <main class="flex-1 flex overflow-hidden relative font-sans">
        <div id="appRoot" class="flex-1 flex overflow-hidden"></div>
    </main>
    <!-- STATE MANAGEMENT & RUNTIME LOGIC -->
    <script src="assets/js/router.js"></script>
    <script>
        // System Application State Model
        const state = {
            currentStage: 1,
            workspaceMode: 'edit', // edit, suggestions, audio, formatting
            canvasTheme: 'dark', // dark, word (MS Word Mockup)

            // Texas UFM Mandatory Schema Mapping (Binds directly to verified input UI)
            caseInfo: {
                cause: "",
                caption: "SARAH JENKINS vs. NEXUS PHARMA INC.",
                court: "",
                county: "",
                state: "Texas",
                deponent: "",
                date: "",
                startTime: "",
                endTime: "",
                address: "",
                csrName: "",
                csrLicense: "",
                firmReg: "",
                csrCertExp: "",
                custodialName: "",
                requestingParty: "",
                strictLineLock: true,
                signature: "",
                certified: false
            },

            // Multiple Files Processing Sequence Queue State
            fileQueue: [],
            isQueueProcessing: false,
            elapsedProcessTime: 0,
            elapsedTimerInterval: null,

            // Sequence of transcript lines containing alignments, confidence arrays, and metadata
            transcriptLines: [
                { id: "line-1", index: 1, speaker: "VANCE", text: "State your full name and credentials for the record, please.", type: "Q", confidence: 0.98, hasSuggestion: false, duration: 4.2 },
                { id: "line-2", index: 2, speaker: "LEIFER", text: "Dr. Donald Leifer. I am a board-certified neurosurgeon with Houston Neurological.", type: "A", confidence: 0.94, hasSuggestion: true, suggestion: { word: "Leifer", original: "lifer", replacement: "Leifer", source: "NOD File Alignment", confidence: 0.97 }, duration: 5.5 },
                { id: "line-3", index: 3, speaker: "VANCE", text: "And did you have occasion to review the MRI scans for Ms. Sarah Jenkins?", type: "Q", confidence: 0.99, hasSuggestion: false, duration: 4.0 },
                { id: "line-4", index: 4, speaker: "LEIFER", text: "Yes, we took detailed brain scans and identified an acoustic neuroma.", type: "A", confidence: 0.72, hasSuggestion: true, suggestion: { word: "acoustic neuroma", original: "a coostik new roma", replacement: "acoustic neuroma", source: "NOD Medical Dictionary", confidence: 0.94 }, duration: 6.1 },
                { id: "line-5", index: 5, speaker: "VANCE", text: "Let the record reflect that MRI scans are now marked as Exhibit 1 for identification.", type: "Q", confidence: 0.97, hasSuggestion: false, duration: 5.0, exhibit: 1 },
                { id: "line-6", index: 6, speaker: "VANCE", text: "Can you confirm the dimensions of the mass found during that scan, Doctor?", type: "Q", confidence: 0.96, hasSuggestion: false, duration: 4.5 },
                { id: "line-7", index: 7, speaker: "LEIFER", text: "It was approximately, um, 2.4 centimeters on the largest axis.", type: "A", confidence: 0.81, hasSuggestion: true, suggestion: { word: "um", original: "um", replacement: "", type: "filler", source: "Filler deletion Suggestion", confidence: 0.99 }, duration: 4.8 },
                { id: "line-8", index: 8, speaker: "VANCE", text: "And was that mass compromising the adjacent nerve structures?", type: "Q", confidence: 0.98, hasSuggestion: false, duration: 3.8 },
                { id: "line-9", index: 9, speaker: "LEIFER", text: "Yes. It was compressing the seventh cranial nerve pathway.", type: "A", confidence: 0.95, hasSuggestion: false, duration: 5.2 }
            ],
            exhibits: [
                { id: "ex-1", num: 1, title: "MRI Imaging Scans - Left Frontal Lobe", page: 1, line: 5, attorney: "Mr. Richard Vance" },
                { id: "ex-2", num: 2, title: "Neurosurgeon Practice Certification", page: 1, line: 9, attorney: "Mr. Richard Vance" }
            ],
            correctionsMemory: [
                { original: "doctor lifer", replacement: "Doctor Leifer", scope: "global" },
                { original: "nexus farma", replacement: "Nexus Pharma", scope: "case" }
            ],
            provenance: [
                { title: "Deepgram Transcribe", text: "Raw transcription engine connected successfully.", timestamp: "10:24 AM", type: "system" },
                { title: "NOD dictionary seed", text: "Extracted Doctor Leifer as primary deponent.", timestamp: "10:24 AM", type: "ai" }
            ],
            activePlayback: false,
            playbackInterval: null,
            playbackLineIdx: 0,
            playbackSpeed: 1.0,
            focusedLineId: "line-1",

            // Audio input streaming configuration
            isStreaming: false,
            audioContext: null,
            audioAnalyser: null,
            micStream: null,
            visualizerTimer: null,
            liveTranscriptCounter: 10,
            liveSearchQuery: ""
        };

        const initialRawNotesSeed = `REPORTER SCHEDULING NOTE:
Deposition of Dr. Donald Leifer held on May 19, 2026.
Case Caption: SARAH JENKINS vs. NEXUS PHARMA INC.
Cause No. 2024-CI-28593
Court: 101st Judicial District of Dallas County, Texas
Start at 10:00 AM, finished at 12:30 PM.
Deposition location: Lexitas Fort Worth, 201 Main Street, Suite 600, Fort Worth, Texas 76102.
Court Reporter: Richard Vance, CSR License 3465, expiration 2027-12-31, Firm Registration 10698.
Custodial Attorney: Ms. Elizabeth R. Flora, Esq. representing Plaintiff sarah jenkins.
Acoustic spellings to sync: Acoustic Neuroma, cranial, Leifer.`;

        function seedRawIntakeNotes() {
            const rawNotesField = document.getElementById('rawIntakeNotes');
            if (rawNotesField && !rawNotesField.value.trim()) {
                rawNotesField.value = initialRawNotesSeed;
            }
        }

        // Window Initializer
        window.onload = function() {
            seedRawIntakeNotes();
            renderAllStateComponents();
            if (document.getElementById('validationSummaryBadge')) {
                checkSchemaValidationStatus();
            }
            showToast("Workspace initialized. Texas UFM layout active.");
        };

        // Complete state rendering dispatch
        function renderAllStateComponents() {
            if (document.getElementById('speakersList')) renderSpeakersList();
            if (document.getElementById('correctionsMemoryContainer')) renderCorrectionMemory();
            if (document.getElementById('provenanceLogContainer')) renderProvenanceTimeline();
            if (document.getElementById('transcriptLinesContainer')) compileAndRenderTranscript();
            if (document.getElementById('exhibitsIndexList')) renderExhibitsIndex();
            if (document.getElementById('flagCount')) updateStatsBar();
            if (document.getElementById('sequentialQueueList')) renderFileQueue();
            if (document.getElementById('intakeEntitiesList')) renderSpellingDictionarySeeds();
        }

        // Custom notification system (replaces alert/confirm)
        function showToast(message, type = 'indigo') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-3.5 bg-slate-900 border-l-4 rounded-r-xl border-${type}-500 text-white text-xs shadow-2xl flex items-center justify-between gap-3 animate-slide-in pointer-events-auto`;
            toast.innerHTML = `
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" class="text-slate-500 hover:text-white">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        // Active Validation Checkers for inputs
        function validateUFMField(inputEl, label) {
            const val = inputEl.value.trim();
            const badge = inputEl.parentElement.querySelector('.ufm-val-badge');

            // Map inputs to state case schema
            const idMap = {
                'ufmCause': 'cause',
                'ufmStyle': 'caption',
                'ufmCourt': 'court',
                'ufmCounty': 'county',
                'ufmState': 'state',
                'ufmWitness': 'deponent',
                'ufmDate': 'date',
                'ufmStartTime': 'startTime',
                'ufmEndTime': 'endTime',
                'ufmAddress': 'address',
                'ufmCSRName': 'csrName',
                'ufmCSRLicense': 'csrLicense',
                'ufmFirmReg': 'firmReg',
                'ufmCSRCertExp': 'csrCertExp',
                'ufmCustodialName': 'custodialName',
                'ufmRequestingParty': 'requestingParty'
            };

            const stateField = idMap[inputEl.id];
            if (stateField) {
                state.caseInfo[stateField] = val;
            }

            if (val === "") {
                inputEl.className = "w-full bg-slate-900 border border-red-500/30 text-xs px-2.5 py-1.5 rounded-lg text-white focus:outline-none";
                if (badge) {
                    badge.innerText = "MISSING";
                    badge.className = "ufm-val-badge absolute right-2 top-6 text-[8px] px-1 py-0.2 rounded bg-red-500/10 text-red-400";
                }
            } else {
                inputEl.className = "w-full bg-slate-900 border border-emerald-500/30 text-xs px-2.5 py-1.5 rounded-lg text-white focus:outline-none";
                if (badge) {
                    badge.innerText = "✓ VERIFIED";
                    badge.className = "ufm-val-badge absolute right-2 top-6 text-[8px] px-1 py-0.2 rounded bg-emerald-500/10 text-emerald-400";
                }
            }

            // Sync global layouts
            if (stateField === 'caption') {
                document.getElementById('caseCaption').value = val;
            }
            if (stateField === 'deponent') {
                document.getElementById('caseDeponent').value = val;
            }

            checkSchemaValidationStatus();
        }

        // Run validation calculations over all fields
        function checkSchemaValidationStatus() {
            const summaryBadge = document.getElementById('validationSummaryBadge');
            if (!summaryBadge) return;

            const fields = [
                'ufmCause', 'ufmStyle', 'ufmCourt', 'ufmCounty', 'ufmState',
                'ufmWitness', 'ufmDate', 'ufmStartTime', 'ufmEndTime', 'ufmAddress',
                'ufmCSRName', 'ufmCSRLicense', 'ufmFirmReg', 'ufmCSRCertExp',
                'ufmCustodialName', 'ufmRequestingParty'
            ];

            let incomplete = false;
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.value.trim() === "") {
                    incomplete = true;
                }
            });

            if (incomplete) {
                summaryBadge.innerText = "⚠️ SCHEMA INCOMPLETE";
                summaryBadge.className = "text-[10px] px-2 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20 font-bold";
            } else {
                summaryBadge.innerText = "✓ ALL FIELDS VERIFIED";
                summaryBadge.className = "text-[10px] px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-bold";
            }
        }

        // Simulated AI Legal notes parser engine
        function runAILegalParser() {
            const rawNotes = document.getElementById('rawIntakeNotes').value;
            if (!rawNotes.trim()) {
                showToast("Intake notes workspace is empty. Please enter text.", "red");
                return;
            }

            showToast("Parsing notice text utilizing UFM extraction matrices...", "cyan");
            addProvenanceRecord("Notice Parser Sandbox", "Initiated natural language regex parser.", "system");

            // Simple mock extraction logic scanning common structures
            setTimeout(() => {
                const docFields = {
                    'ufmCause': '2024-CI-28593',
                    'ufmStyle': 'SARAH JENKINS vs. NEXUS PHARMA INC.',
                    'ufmCourt': '101st Judicial District',
                    'ufmCounty': 'Dallas County',
                    'ufmState': 'Texas',
                    'ufmWitness': 'Dr. Donald Leifer',
                    'ufmDate': '2026-05-19',
                    'ufmStartTime': '10:00 AM',
                    'ufmEndTime': '12:30 PM',
                    'ufmAddress': '201 Main Street, Suite 600, Fort Worth, Texas 76102',
                    'ufmCSRName': 'Richard Vance, CSR',
                    'ufmCSRLicense': '3465',
                    'ufmFirmReg': '10698',
                    'ufmCSRCertExp': '2027-12-31',
                    'ufmCustodialName': 'Ms. Elizabeth R. Flora, Esq.',
                    'ufmRequestingParty': 'Vance & Partners LLP'
                };

                for (const [id, value] of Object.entries(docFields)) {
                    const input = document.getElementById(id);
                    if (input) {
                        input.value = value;
                        validateUFMField(input, id);
                        input.classList.add('animate-flash');
                        setTimeout(() => input.classList.remove('animate-flash'), 1500);
                    }
                }

                // Add extraction dictionary items
                state.correctionsMemory.push({ original: "doc leifer", replacement: "Dr. Donald Leifer", scope: "case" });
                state.correctionsMemory.push({ original: "neuroma", replacement: "Acoustic Neuroma", scope: "case" });

                renderAllStateComponents();
                showToast("Acoustic entities parsed. UFM Verification Board complete!", "emerald");
                addProvenanceRecord("Notice Parser Sandbox", "Extracted 16/16 legal fields successfully.", "ai");
            }, 1200);
        }

        // Render intake seeds
        function renderSpellingDictionarySeeds() {
            const list = document.getElementById('intakeEntitiesList');
            if (!list) return;
            list.innerHTML = "";

            const seeds = [
                { type: 'Deponent', val: state.caseInfo.deponent || "Dr. Donald Leifer", desc: "Expert Neurosurgeon Witness" },
                { type: 'Attorneys', val: state.caseInfo.custodialName || "Richard Vance, Esq.", desc: "Host Counsel / PLAINTIFF REPRESENTATIVE" },
                { type: 'Acoustic terminology', val: "Acoustic Neuroma", desc: "Surgical reference from para 4" }
            ];

            seeds.forEach(seed => {
                const card = document.createElement('div');
                card.className = "bg-slate-950/60 p-3 rounded-xl border border-slate-800/80";
                card.innerHTML = `
                    <span class="text-[9px] font-bold tracking-wider uppercase text-cyan-400 bg-cyan-500/10 px-1.5 py-0.5 rounded">${seed.type}</span>
                    <p class="text-xs font-semibold text-white mt-1 font-mono">${seed.val}</p>
                    <p class="text-[10px] text-slate-500 mt-0.5">${seed.desc}</p>
                `;
                list.appendChild(card);
            });
        }

        // Proceed confirmation check
        function confirmProceedWithSchemaCheck() {
            const summaryBadge = document.getElementById('validationSummaryBadge');
            if (summaryBadge.innerText.includes("INCOMPLETE")) {
                showToast("Warning: Some mandatory UFM variables are blank. UFM generation may fail.", "amber");
            }
            goToStage(2);
        }

        // Stage Management
        function goToStage(stageNum) {
            if (state.caseInfo.certified && stageNum < 5) {
                showToast("This transcript is CERTIFIED and LOCKED. Request unlock to edit.", "red");
                return;
            }

            // Update tab highlights
            for (let i = 1; i <= 6; i++) {
                const tab = document.getElementById(`stageTab${i}`);
                if (!tab) continue;
                if (i === stageNum) {
                    tab.className = "px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition-all text-indigo-400 bg-indigo-500/10 border border-indigo-500/20 shadow-sm";
                } else {
                    tab.className = "px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-all text-slate-400 hover:text-slate-200 hover:bg-slate-800";
                }
            }
            state.currentStage = stageNum;
            loadScreen(stageNum);
            showToast(`Stage loaded: ${getStageName(stageNum)}`);
        }

        function getStageName(num) {

        // Execute sequential queue processing loop with advanced ETA algorithms
        function startSequentialIngestion() {
            if (state.fileQueue.length === 0 || state.isQueueProcessing) return;

            state.isQueueProcessing = true;
            document.getElementById('btnIngestQueue').disabled = true;

            const logs = document.getElementById('sequentialLogs');
            const progressContainer = document.getElementById('sequentialProgressBar');
            const fill = document.getElementById('queueProgressFill');
            const percentLabel = document.getElementById('queueProgressPercent');
            const label = document.getElementById('queueProgressLabel');

            // Dynamic Metrics elements
            const statTimeElapsed = document.getElementById('statTimeElapsed');
            const statTimeRemaining = document.getElementById('statTimeRemaining');
            const statSpeedRatio = document.getElementById('statSpeedRatio');

            logs.classList.remove('hidden');
            progressContainer.classList.remove('hidden');
            logs.innerHTML = "<p class='text-indigo-400'>> Initializing chronological multi-file pipeline...</p>";

            let currentFileIdx = 0;
            state.elapsedProcessTime = 0;

            // Start master elapsed timer ticker
            state.elapsedTimerInterval = setInterval(() => {
                state.elapsedProcessTime += 0.1;
                statTimeElapsed.innerText = `${state.elapsedProcessTime.toFixed(1)}s`;
            }, 100);

            function processNextFile() {
                if (currentFileIdx >= state.fileQueue.length) {
                    // Entire queue finished
                    clearInterval(state.elapsedTimerInterval);
                    state.isQueueProcessing = false;
                    showToast("All media files in sequence processed and compiled!", "emerald");
                    addProvenanceRecord("Sequential File Compiler", `Successfully compiled ${state.fileQueue.length} files into living transcript layer.`, "system");

                    // Reset diagnostic stats
                    statTimeRemaining.innerText = "Completed";
                    statSpeedRatio.className = "text-emerald-400 font-bold";
                    statSpeedRatio.innerText = "All Transcripts Synced";

                    // Automatically add mock lines from batch sequence to display in Stage 3
                    appendChronologicalMockSegments();

                    setTimeout(() => {
                        goToStage(3);
                    }, 1500);
                    return;
                }

                const currentFile = state.fileQueue[currentFileIdx];
                currentFile.status = "Processing...";
                renderFileQueue();

                label.innerText = `Ingesting File ${currentFileIdx + 1} of ${state.fileQueue.length}: ${currentFile.name}`;

                const p = document.createElement('p');
                p.className = "text-slate-400";
                p.innerText = `> Connecting ${currentFile.name} to Deepgram Nova-3 engine...`;
                logs.appendChild(p);
                logs.scrollTop = logs.scrollHeight;

                let fileProgress = 0;
                const fileInterval = setInterval(() => {
                    fileProgress += 10;
                    currentFile.progress = fileProgress;

                    // Aggregate Progress calculation
                    const aggregateProgress = ((currentFileIdx * 100 + fileProgress) / (state.fileQueue.length * 100)) * 100;
                    fill.style.width = `${aggregateProgress}%`;
                    percentLabel.innerText = `${Math.round(aggregateProgress)}%`;

                    // Dynamic Speed and ETA predictions
                    const speedMultiplier = 8.0 + Math.random() * 2.5; // realistic fluctuating processor speed
                    statSpeedRatio.innerText = `${speedMultiplier.toFixed(1)}x Real-Time`;

                    // Calculate ETA in seconds remaining
                    const remainingPercent = 100 - aggregateProgress;
                    const etaEstimatedSeconds = Math.max(1, Math.round((state.elapsedProcessTime / aggregateProgress) * remainingPercent));
                    statTimeRemaining.innerText = `${etaEstimatedSeconds}s left`;

                    renderFileQueue();

                    if (fileProgress === 50) {
                        const logText = document.createElement('p');
                        logText.className = "text-slate-500";
                        logText.innerText = `> Diarizing speaker vocal tracks on [${currentFile.name}]...`;
                        logs.appendChild(logText);
                    }

                    if (fileProgress >= 100) {
                        clearInterval(fileInterval);
                        currentFile.status = "Completed";
                        currentFile.progress = 100;
                        renderFileQueue();

                        const completionLog = document.createElement('p');
                        completionLog.className = "text-emerald-400 font-semibold";
                        completionLog.innerText = `> Ingest complete for [${currentFile.name}]. Raw layer locked.`;
                        logs.appendChild(completionLog);

                        currentFileIdx++;
                        setTimeout(processNextFile, 400);
                    }
                }, 250);
            }

            processNextFile();
        }

        // Hardware Microphone & Audio Analyser logic
        async function requestMicPermissions() {
            try {
                if (!state.audioContext) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    state.micStream = stream;

                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    state.audioContext = new AudioContextClass();
                    state.audioAnalyser = state.audioContext.createAnalyser();

                    const source = state.audioContext.createMediaStreamSource(stream);
                    source.connect(state.audioAnalyser);
                    state.audioAnalyser.fftSize = 32;
                }
            } catch (err) {
                showToast("Microphone capture disabled. Running in simulation mode.", "amber");
            }
        }

        // SVG Visualizer movement simulation mapping to real microphone amplitude if available
        function runAudioVisualizerAnimation() {
            const visualizerBars = document.getElementById('visualizerBars');
            const dataArray = new Uint8Array(state.audioAnalyser ? state.audioAnalyser.frequencyBinCount : 16);

            state.visualizerTimer = setInterval(() => {
                let amplitude = 25;
                if (state.audioAnalyser) {
                    state.audioAnalyser.getByteFrequencyData(dataArray);
                    amplitude = dataArray.reduce((acc, v) => acc + v, 0) / dataArray.length;
                } else {
                    amplitude = 15 + Math.random() * 40; // Random fallback visualizer
                }

                // Adjust SVG paths based on mic frequency
                const scale = Math.max(10, Math.min(amplitude, 60));
                visualizerBars.setAttribute('d', `M50,${50 - scale/2} L50,${50 + scale/2} M35,${50 - scale/3} L35,${50 + scale/3} M65,${50 - scale/3} L65,${50 + scale/3}`);

                // Keep live timer active
                const date = new Date();
                document.getElementById('liveTimestamp').innerText = date.toLocaleTimeString();
            }, 100);
        }

        // Custom Programmatic Rule/Regex Python & VBA Preprocessing
        function runCustomRegexRulePipeline() {
            const findVal = document.getElementById('regexFindInput').value;
            const replaceVal = document.getElementById('regexReplaceInput').value;

            if (!findVal) {
                showToast("Please enter a valid Find RegEx.", "red");
                return;
            }

            showToast("Running Python Pipeline Preprocessing...", "indigo");

            try {
                const regex = new RegExp(findVal, 'gi');
                let matchesCount = 0;

                state.transcriptLines.forEach(line => {
                    if (line.text.match(regex)) {
                        line.text = line.text.replace(regex, replaceVal);
                        matchesCount++;
                    }
                });

                if (matchesCount > 0) {
                    addProvenanceRecord("Python RegEx Pipeline", `Executed find/replace [${findVal}] -> [${replaceVal}]. ${matchesCount} substitutions completed.`, "system");
                    compileAndRenderTranscript();
                    showToast(`Pipeline execution successful: ${matchesCount} modifications applied.`, "emerald");
                } else {
                    showToast("No pattern occurrences located in transcription arrays.", "amber");
                }
            } catch (err) {
                showToast(`Regex Error: ${err.message}`, "red");
            }
        }

        // Compile and render Texas UFM conforming to standard page boundaries
        function compileAndRenderTranscript() {
            const linesContainer = document.getElementById('transcriptLinesContainer');
            if (!linesContainer) return;
            linesContainer.innerHTML = "";

            let currentLineNumberOnPage = 1;
            let currentPageNumber = 1;

            state.transcriptLines.forEach((line) => {
                // If Texas strict limits are locked, wrap at 25 lines
                if (state.caseInfo.strictLineLock && currentLineNumberOnPage > 25) {
                    const divider = document.createElement('div');
                    divider.className = "border-t-2 border-dashed border-red-500/20 my-8 py-3 text-center text-xs font-mono select-none relative z-10 text-slate-500";
                    divider.innerHTML = `--- END OF PAGE ${currentPageNumber} (TEXAS UFM PAGE BREAK POINT) ---`;
                    linesContainer.appendChild(divider);

                    currentPageNumber++;
                    currentLineNumberOnPage = 1;
                }

                const row = document.createElement('div');
                row.className = `group flex items-start gap-4 hover:bg-slate-900/20 p-1.5 rounded transition-all cursor-pointer relative ${state.focusedLineId === line.id ? 'bg-indigo-950/20 border-l-2 border-indigo-500' : ''}`;
                row.id = line.id;
                row.setAttribute('onclick', `focusLineRow('${line.id}')`);

                // Index column
                const numIndex = document.createElement('div');
                numIndex.className = `w-8 text-right font-mono text-xs select-none pr-3 ${state.canvasTheme === 'word' ? 'text-slate-400' : 'text-slate-600'}`;
                numIndex.innerText = currentLineNumberOnPage;

                // Gutter Indicator
                const gutter = document.createElement('div');
                let gutterColor = "bg-emerald-500";
                if (line.confidence < 0.8) gutterColor = "bg-amber-500 animate-pulse";
                gutter.className = `w-1 self-stretch rounded-full ${gutterColor} select-none mr-2`;

                // Main textual column
                const textBlock = document.createElement('div');
                textBlock.className = `flex-1 font-mono text-xs md:text-sm select-text ${state.canvasTheme === 'word' ? 'text-slate-800' : 'text-slate-300'}`;

                let prefixHtml = "";
                if (line.type === "Q") {
                    prefixHtml = `<span class="text-indigo-600 font-bold mr-2 select-none">Q.</span>`;
                } else if (line.type === "A") {
                    prefixHtml = `<span class="text-cyan-600 font-bold mr-2 select-none">A.</span>`;
                }

                // Highlight low confidence boundaries
                let textContentHtml = "";
                const words = line.text.split(" ");

                words.forEach((word) => {
                    let cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

                    if (line.hasSuggestion && line.suggestion.word.toLowerCase() === cleanWord.toLowerCase()) {
                        textContentHtml += `<span class="low-confidence-word text-amber-500 font-medium relative cursor-pointer hover:bg-amber-500/10 rounded px-0.5" onclick="event.stopPropagation(); triggerSuggestionBox('${line.id}')">${word}</span> `;
                    } else if (line.confidence < 0.85 && cleanWord.toLowerCase() === "seventh") {
                        textContentHtml += `<span class="low-confidence-word text-amber-500 cursor-pointer" onclick="event.stopPropagation(); triggerSuggestionBox('${line.id}')">${word}</span> `;
                    } else {
                        textContentHtml += `<span>${word}</span> `;
                    }
                });

                textBlock.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 select-none">
                        <span class="text-[9px] font-bold text-slate-500 tracking-wider">${line.speaker}</span>
                        ${line.exhibit ? `<span class="text-[8px] px-1 bg-cyan-500/10 text-cyan-500 border border-cyan-500/20 rounded">EXHIBIT ${line.exhibit} MARKED</span>` : ''}
                    </div>
                    <div class="transcript-line outline-none focus:bg-indigo-500/5 focus:rounded p-0.5" contenteditable="${state.caseInfo.certified ? 'false' : 'true'}" onblur="handleTextEdit('${line.id}', this.innerHTML)">
                        ${prefixHtml}${textContentHtml}
                    </div>
                `;

                row.appendChild(numIndex);
                row.appendChild(gutter);
                row.appendChild(textBlock);

                // Inline suggestion display (Stage 3 Suggestion Sweep Mode)
                if (state.workspaceMode === 'suggestions' && line.hasSuggestion) {
                    const inlineCassette = createInlineSuggestionCassette(line);
                    const wrapper = document.createElement('div');
                    wrapper.className = "w-full";
                    wrapper.appendChild(row);
                    wrapper.appendChild(inlineCassette);
                    linesContainer.appendChild(wrapper);
                } else {
                    linesContainer.appendChild(row);
                }

                currentLineNumberOnPage++;
            });

            document.getElementById('livePaginationStats').innerText = `${currentPageNumber} Page${currentPageNumber > 1 ? 's' : ''} Total`;
        }

        // Inline Cassette Suggestions Drawer UI Block

                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        <span class="text-xs font-bold text-white">AI Alignment Match</span>
                    </div>
                    <span class="text-[9px] font-mono text-slate-500 uppercase">${line.suggestion.source}</span>
                </div>
                <div class="bg-slate-950 p-3 rounded-lg border border-slate-900 flex items-center justify-between gap-4 mb-3">
                    <div class="font-mono text-xs">
                        <span class="text-red-400 line-through mr-2 font-mono">"${line.suggestion.original}"</span>

                        <span class="text-emerald-400 font-bold ml-2 font-mono">"${line.suggestion.replacement}"</span>

                    <button onclick="rejectSuggestion('${line.id}')" class="px-3 py-1.5 bg-slate-950 hover:bg-slate-800 border border-slate-800 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition-all">Reject</button>
                    <button onclick="acceptSuggestion('${line.id}')" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-semibold transition-all">Accept</button>
                    <button onclick="acceptAndRememberSuggestion('${line.id}')" class="px-3 py-1.5 bg-emerald-600/10 hover:bg-emerald-600 text-emerald-400 hover:text-white border border-emerald-500/20 rounded-lg text-xs font-bold transition-all">Accept + Remember</button>
                </div>
            `;
            return cassette;
        }

        // Direct Text Editor State handler
        function handleTextEdit(id, newHtml) {
            let cleanText = newHtml.replace(/<span[^>]*>.*?<\/span>/g, '').trim();
            cleanText = cleanText.replace(/&nbsp;/g, ' ');

            const line = state.transcriptLines.find(l => l.id === id);
            if (line && line.text !== cleanText) {
                const oldText = line.text;
                line.text = cleanText;

                addProvenanceRecord("Human Line Correction", `Row ${line.index} text correction: "${oldText}" -> "${cleanText}"`, "user");
                compileAndRenderTranscript();
                showToast(`Line ${line.index} updated.`);
            }
        }

        // Focused Line Event Tracker
        function focusLineRow(id) {
            state.focusedLineId = id;
            const line = state.transcriptLines.find(l => l.id === id);
            if (line) {
                document.getElementById('cursorLineTracker').innerText = `LINE ${line.index}`;
                drawAudioWaveProgress(line.index);
                updateRightPanelContext(line);
                if (state.workspaceMode === 'suggestions') {
                    triggerSuggestionBox(id);
                }
            }
        }

        function drawAudioWaveProgress(index) {
            const playhead = document.getElementById('playheadIndicator');
            const percent = Math.min((index / state.transcriptLines.length) * 100, 100);
            playhead.style.left = `${percent}%`;

            const totalDuration = state.transcriptLines.slice(0, index).reduce((acc, c) => acc + c.duration, 0);
            document.getElementById('audioTimeLabel').innerText = `00:${totalDuration.toFixed(0).padStart(2, '0')}.2 / 02:45.0`;
        }

        function updateRightPanelContext(line) {
            document.getElementById('confidenceScoreLabel').innerText = `${(line.confidence * 100).toFixed(0)}% Conf`;
            if (line.confidence < 0.85) {
                document.getElementById('confidenceScoreLabel').className = "text-[10px] font-semibold font-mono text-amber-400 bg-amber-500/10 px-1.5 py-0.5 rounded";
            } else {
                document.getElementById('confidenceScoreLabel').className = "text-[10px] font-semibold font-mono text-emerald-400 bg-emerald-500/10 px-1.5 py-0.5 rounded";
            }
        }

        // Change workspace mode tabs
        function setWorkspaceMode(mode) {
            state.workspaceMode = mode;
            const bannerText = document.getElementById('modeBannerText');

            const btns = ['Edit', 'Suggestions', 'Audio', 'Formatting'];
            btns.forEach(b => {
                const btn = document.getElementById(`modeBtn${b}`);
                btn.className = "px-3 py-1.5 text-xs font-medium rounded-lg transition-all border border-transparent text-slate-400 hover:text-slate-200";
            });

            document.getElementById('toolSectionAudio').classList.add('hidden');
            document.getElementById('toolSectionSuggestions').classList.add('hidden');
            document.getElementById('toolSectionFormatting').classList.add('hidden');

                document.getElementById('modeBtnEdit').className = "px-3 py-1.5 text-xs font-medium rounded-lg transition-all border border-slate-700 bg-slate-800 text-white shadow-sm";
                bannerText.innerText = "Free Edit Mode: Click any line and type to edit text directly. Left rail tags are preserved automatically.";
                document.getElementById('toolSectionAudio').classList.remove('hidden');
                document.getElementById('rightPanelTitle').innerText = "Audio & Context Wave";
            } else if (mode === 'suggestions') {
                document.getElementById('modeBtnSuggestions').className = "px-3 py-1.5 text-xs font-medium rounded-lg transition-all border border-slate-700 bg-slate-800 text-white shadow-sm";

                document.getElementById('rightPanelTitle').innerText = "Acoustic Playback Engine";

        // Suggestions action execution
        function acceptSuggestion(lineId) {
            const line = state.transcriptLines.find(l => l.id === lineId);
            if (line && line.hasSuggestion) {
                line.text = line.text.replace(new RegExp(line.suggestion.original, 'gi'), line.suggestion.replacement);
                line.hasSuggestion = false;
                addProvenanceRecord("AI Match Accepted", `Substituted speech block segment with [${line.suggestion.replacement}]`, "ai");
                compileAndRenderTranscript();
                showToast("AI suggestion merged into living transcript arrays.", "emerald");
                triggerSuggestionBox(lineId);
            }
        }

        function rejectSuggestion(lineId) {
            const line = state.transcriptLines.find(l => l.id === lineId);
            if (line && line.hasSuggestion) {
                line.hasSuggestion = false;
                addProvenanceRecord("AI Match Rejected", `Dismissed AI suggestions on line index ${line.index}`, "user");
                compileAndRenderTranscript();
                showToast("Suggestion dismissed.");
                triggerSuggestionBox(lineId);
            }
        }

        function acceptAndRememberSuggestion(lineId) {
            const line = state.transcriptLines.find(l => l.id === lineId);
            if (line && line.hasSuggestion) {
                state.correctionsMemory.push({
                    original: line.suggestion.original,
                    replacement: line.suggestion.replacement,
                    scope: "global"
                });

                line.text = line.text.replace(new RegExp(line.suggestion.original, 'gi'), line.suggestion.replacement);
                line.hasSuggestion = false;

                addProvenanceRecord("Correction Memory Commit", `Learned globally: "${line.suggestion.original}" matches "${line.suggestion.replacement}"`, "user");
                compileAndRenderTranscript();
                renderCorrectionMemory();
                showToast("Correction captured and saved to reporter memory dictionary!", "emerald");
                triggerSuggestionBox(lineId);
            }
        }

        // Visual format prefixes (Q & A)
        function applyLinePrefix(type) {
            const line = state.transcriptLines.find(l => l.id === state.focusedLineId);
            if (line) {
                line.type = type;
                addProvenanceRecord("UFM Formatting Shift", `Enforced prefix rules type ${type} on row ${line.index}`, "user");
                compileAndRenderTranscript();
                showToast(`Prefix set to ${type === 'Q' ? 'Question' : 'Answer'}.`);
            }
        }

        // Insert new structural elements
        function forceManualPageBreak() {
            state.transcriptLines.push({
                id: `manual-line-${Date.now()}`,
                index: state.transcriptLines.length + 1,
                speaker: "SYSTEM",
                text: "--- MANUALLY FORCED PAGINATION BARRIER ---",
                type: "text",
                confidence: 1.0,
                hasSuggestion: false,
                duration: 0.0
            });
            compileAndRenderTranscript();
            showToast("Forced layout page break boundary applied.");
        }

        function removeFillerWordsGlobal() {
            state.transcriptLines.forEach(line => {
                line.text = line.text.replace(/\b(um|uh)\b/gi, '').replace(/\s+/g, ' ').trim();
            });
            addProvenanceRecord("Acoustic Prep Pipeline", "Removed linguistic fillers (um/uh) globally.", "system");
            compileAndRenderTranscript();
            showToast("Linguistic fillers removed globally.", "emerald");
        }

        // Global playback sync controls
        function toggleAudioPlayback() {
            state.activePlayback = !state.activePlayback;
            const playBtn = document.getElementById('playAudioBtn');
            const svg = document.getElementById('playIconSvg');

            if (state.activePlayback) {
                svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6"/>`;
                playBtn.className = "bg-amber-500 hover:bg-amber-400 text-white font-bold p-3 rounded-xl shadow-lg shadow-amber-500/20 transition-all flex items-center justify-center";
                showToast("Audio timeline active. Seeking utterance timestamps.");

                state.playbackInterval = setInterval(() => {
                    state.playbackLineIdx++;
                    if (state.playbackLineIdx >= state.transcriptLines.length) {
                        state.playbackLineIdx = 0;
                    }
                    focusLineRow(state.transcriptLines[state.playbackLineIdx].id);
                }, 1000 / state.playbackSpeed);
            } else {
                svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
                playBtn.className = "bg-indigo-600 hover:bg-indigo-500 text-white font-bold p-3 rounded-xl shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center";
                clearInterval(state.playbackInterval);
            }
        }

        function changeAudioSpeed(val) {
            state.playbackSpeed = parseFloat(val);
            document.getElementById('audioSpeedLabel').innerText = `${state.playbackSpeed.toFixed(1)}x`;
            if (state.activePlayback) {
                clearInterval(state.playbackInterval);
                state.playbackInterval = setInterval(() => {
                    state.playbackLineIdx++;
                    if (state.playbackLineIdx >= state.transcriptLines.length) state.playbackLineIdx = 0;
                    focusLineRow(state.transcriptLines[state.playbackLineIdx].id);
                }, 1000 / state.playbackSpeed);
            }
        }

        function skipAudio(val) {
            const change = val > 0 ? 1 : -1;
            state.playbackLineIdx = Math.max(0, Math.min(state.playbackLineIdx + change, state.transcriptLines.length - 1));
            focusLineRow(state.transcriptLines[state.playbackLineIdx].id);
        }

                item.innerHTML = `

                    </div>
                    <span class="text-[9px] text-slate-500 font-mono font-sans">Speaker Block</span>

        function renderCorrectionMemory() {
            const container = document.getElementById('correctionsMemoryContainer');
            if (!container) return;
            container.innerHTML = "";

                const item = document.createElement('div');

                item.innerHTML = `
                    <div class="truncate mr-2">

                    <span class="text-[8px] bg-slate-950 px-1 py-0.2 rounded text-slate-500 font-mono uppercase">${corr.scope}</span>
                `;

        // Certification & Verification sign execution
        function signTranscript() {
            const sig = document.getElementById('reporterSignatureInput').value.trim();
            const check1 = document.getElementById('certCheck1').checked;
            const check2 = document.getElementById('certCheck2').checked;
            const check3 = document.getElementById('certCheck3').checked;

            if (!sig) {
                showToast("Digital Signature signature code cannot be blank.", "red");
                return;
            }
            if (!check1 || !check2 || !check3) {
                showToast("Please acknowledge and confirm all legal certification parameters.", "red");
                return;
            }

            state.caseInfo.certified = true;
            state.caseInfo.signature = sig;

            document.getElementById('badgeWorking').classList.add('hidden');
            document.getElementById('badgeCertified').classList.remove('hidden');

            document.getElementById('renderedSignatory').innerText = sig;
            document.getElementById('lockTimestamp').innerText = new Date().toLocaleString();

            document.getElementById('certPreLock').classList.add('hidden');
            document.getElementById('certPostLock').classList.remove('hidden');

            addProvenanceRecord("Case Bundle Certified", `Court Reporter signature sealed under certificate key [${sig}]`, "system");
            showToast("Deposition successfully locked and certified!", "emerald");
        }

        // File compilation download action (Aesthetic MS Word / Plain ASCII Export)
        function triggerExportAction() {
            showToast("Compiling margins, headers, exhibit references, and certification seals...", "indigo");

            setTimeout(() => {
                showToast("Secure export wrapper compiled successfully!", "emerald");

                // Build a printable copy-paste text payload simulating DOCX/ASCII layout standard
                let transcriptPayload = `
SARAH JENKINS vs. NEXUS PHARMA INC.
CAUSE NO. 2024-CI-28593
VOLUME I - CERTIFIED DEPOSITION OF DR. DONALD LEIFER

=======================================================
PAGE 1
=======================================================
`;
                state.transcriptLines.forEach(l => {
                    transcriptPayload += `${l.index.toString().padEnd(4, ' ')} | [${l.speaker}] ${l.type === "Q" ? "Q. " : l.type === "A" ? "A. " : ""}${l.text}\n`;
                });

                transcriptPayload += `\n\nEXHIBIT INDEX APPEND:\n`;
                state.exhibits.forEach(ex => {
                    transcriptPayload += `Exhibit ${ex.num}: ${ex.title} · Offered by ${ex.attorney} · Page ${ex.page}, Line ${ex.line}\n`;
                });

                transcriptPayload += `\n\nDIGITAL SIGNATURE ID SEAL: ${state.caseInfo.signature || "Richard Vance CSR"}\n`;

                const blob = new Blob([transcriptPayload], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Jenkins_v_Nexus_Certified_Transcript.docx";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                showToast("Microsoft Word .DOCX compatible transcript payload downloaded!", "emerald");
            }, 2000);
        }

        function simulateSave() {

        window.addEventListener("screen:loaded", (e) => {
            const stageNum = e.detail.stageNum;
            // Re-bind handlers and re-render data into the freshly-mounted screen
            try {
                if (stageNum === 1) {
                    seedRawIntakeNotes();
                    renderSpellingDictionarySeeds && renderSpellingDictionarySeeds();
                    checkSchemaValidationStatus && checkSchemaValidationStatus();
                } else if (stageNum === 2) {
