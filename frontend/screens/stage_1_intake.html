<section class="stage-layout">
    <article class="content-panel">
        <div class="panel-header">
            <div>
                <p class="panel-label">Intake</p>
                <h3>Intake intelligence and entity extraction</h3>
            </div>
            <span class="chip">Phase 3 Live</span>
        </div>
        <p class="lead">
            Parse notices, intake sheets, captions, and scheduling text into structured deposition
            metadata.
        </p>
        <div class="intake-shell">
            <section class="intake-form-shell">
                <div class="placeholder-card intake-form-card">
                    <div class="intake-toolbar">
                        <label class="field-group">
                            <span class="field-label">Persisted Cases</span>
                            <select id="intakeCaseSelect" class="text-input">
                                <option value="">Select a persisted case</option>
                            </select>
                        </label>
                        <div class="action-row">
                            <button
                                id="intakeCasesRefreshButton"
                                class="secondary-button"
                                type="button"
                            >
                                Refresh Cases
                            </button>
                            <button
                                id="intakeDiagnosticsRefreshButton"
                                class="secondary-button"
                                type="button"
                            >
                                Refresh Health
                            </button>
                        </div>
                    </div>
                    <div class="intake-form-grid">
                        <label class="field-group">
                            <span class="field-label">Source Document</span>
                            <input
                                id="intakeSourceDocument"
                                class="text-input"
                                type="text"
                                placeholder="Example: Garza NOD.pdf"
                            />
                        </label>
                        <label class="field-group">
                            <span class="field-label">Case Style Override</span>
                            <input
                                id="intakeCaseStyle"
                                class="text-input"
                                type="text"
                                placeholder="Plaintiff v. Defendant"
                            />
                        </label>
                        <label class="field-group">
                            <span class="field-label">Cause Number Override</span>
                            <input
                                id="intakeCauseNumber"
                                class="text-input"
                                type="text"
                                placeholder="25-cv-00598-OLG"
                            />
                        </label>
                        <label class="field-group">
                            <span class="field-label">Deponent Override</span>
                            <input
                                id="intakeDeponentName"
                                class="text-input"
                                type="text"
                                placeholder="Deponent name"
                            />
                        </label>
                    </div>
                    <label class="field-group">
                        <span class="field-label">Upload Intake Material</span>
                        <input
                            id="intakeFile"
                            class="file-input"
                            type="file"
                            accept=".pdf,.txt,.md,.eml"
                        />
                    </label>
                    <label class="field-group">
                        <span class="field-label">Pasted Intake Text</span>
                        <textarea
                            id="intakePastedText"
                            class="text-area"
                            rows="10"
                            placeholder="Paste NOD text, intake sheet text, caption text, or scheduling email text here."
                        ></textarea>
                    </label>
                    <div class="action-row">
                        <button id="intakeParseButton" class="primary-button" type="button">
                            Parse Intake Materials
                        </button>
                        <button id="intakeReloadButton" class="secondary-button" type="button">
                            Reload Persisted Case
                        </button>
                        <span id="intakeStatus" class="status-pill">Awaiting intake source</span>
                    </div>
                </div>
                <div id="intakeEditableFields" class="placeholder-card intake-form-card"></div>
            </section>
            <section class="intake-results-shell">
                <section
                    class="collapsible-panel empty"
                    data-panel-id="parsed-entities"
                    data-collapsed="false"
                >
                    <button
                        type="button"
                        class="panel-toggle"
                        aria-expanded="true"
                        aria-controls="intakeSummaryGrid"
                    >
                        <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                        <span class="panel-label">Parsed Entities</span>
                        <span class="panel-title">Layer 1 + Layer 2 extraction</span>
                        <span
                            id="intakeCaseIdBadge"
                            class="panel-count"
                            data-panel-count
                            data-state="zero"
                            >0</span
                        >
                    </button>
                    <div
                        id="intakeSummaryGrid"
                        class="panel-content scrollable-panel-body tall"
                    ></div>
                </section>
                <section
                    class="collapsible-panel empty"
                    data-panel-id="speaker-labels"
                    data-collapsed="false"
                >
                    <button
                        type="button"
                        class="panel-toggle"
                        aria-expanded="true"
                        aria-controls="speakerLabelPreview"
                    >
                        <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                        <span class="panel-label">Speaker Labels</span>
                        <span class="panel-title">Diarization mapping</span>
                        <span class="panel-count" data-panel-count data-state="zero">0</span>
                    </button>
                    <div
                        id="speakerLabelPreview"
                        class="panel-content scrollable-panel-body compact-chip-row"
                    ></div>
                </section>
                <section
                    class="collapsible-panel empty"
                    data-panel-id="case-state"
                    data-collapsed="false"
                >
                    <button
                        type="button"
                        class="panel-toggle"
                        aria-expanded="true"
                        aria-controls="intakeCaseStateGrid"
                    >
                        <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                        <span class="panel-label">Case State</span>
                        <span class="panel-title">Pipeline + persistence</span>
                        <span class="panel-count" data-panel-count data-state="zero">0</span>
                    </button>
                    <div id="intakeCaseStateGrid" class="panel-content"></div>
                </section>
            </section>
        </div>
    </article>
    <aside class="side-panel">
        <p class="panel-label">Generated Output</p>
        <div class="placeholder-stack intake-sidebar">
            <section
                class="collapsible-panel empty"
                data-panel-id="keyterm-preview"
                data-collapsed="false"
            >
                <button
                    type="button"
                    class="panel-toggle"
                    aria-expanded="true"
                    aria-controls="keytermPreview"
                >
                    <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                    <span class="panel-label">Keyterm Preview</span>
                    <span class="panel-title">Boost-ranked</span>
                    <span class="panel-count" data-panel-count data-state="zero">0</span>
                </button>
                <div class="panel-content">
                    <div class="action-row" style="margin-bottom: 8px">
                        <select id="keytermSort" class="text-input">
                            <option value="weight">Sort by boost</option>
                            <option value="category">Sort by category</option>
                        </select>
                    </div>
                    <div id="keytermPreview" class="keyterm-cloud scrollable-panel-body"></div>
                </div>
            </section>
            <section
                class="collapsible-panel empty"
                data-panel-id="phonetic-seeds"
                data-collapsed="false"
            >
                <button
                    type="button"
                    class="panel-toggle"
                    aria-expanded="true"
                    aria-controls="phoneticPreview"
                >
                    <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                    <span class="panel-label">Phonetic Seeds</span>
                    <span class="panel-title">Pronunciation hints</span>
                    <span class="panel-count" data-panel-count data-state="zero">0</span>
                </button>
                <div id="phoneticPreview" class="panel-content scrollable-panel-body"></div>
            </section>
            <section
                class="collapsible-panel empty"
                data-panel-id="provenance"
                data-collapsed="false"
            >
                <button
                    type="button"
                    class="panel-toggle"
                    aria-expanded="true"
                    aria-controls="provenancePreview"
                >
                    <span class="panel-chevron" aria-hidden="true">&#9662;</span>
                    <span class="panel-label">Provenance</span>
                    <span class="panel-title">Source + confidence</span>
                    <span class="panel-count" data-panel-count data-state="zero">0</span>
                </button>
                <div id="provenancePreview" class="panel-content scrollable-panel-body"></div>
            </section>
        </div>
    </aside>
</section>
