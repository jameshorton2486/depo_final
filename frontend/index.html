<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DEPO-PRO</title>
        <link rel="stylesheet" href="assets/css/theme.css" />
        <link rel="stylesheet" href="assets/css/layout.css" />
        <link rel="stylesheet" href="assets/css/workspace.css" />
        <link rel="stylesheet" href="assets/css/app.css" />
    </head>
    <body>
        <div class="app-shell">
            <aside class="nav-rail">
                <div class="brand-block">
                    <div class="brand-mark">DP</div>
                    <div>
                        <p class="eyebrow">Local-first Legal Production</p>
                        <h1>DEPO-PRO</h1>
                    </div>
                </div>
                <nav id="stageNav" class="stage-nav" aria-label="Pipeline stages"></nav>
                <section class="rail-panel">
                    <p class="panel-label">Transcript Layers</p>
                    <div class="badge-row">
                        <span class="layer-badge raw">RAW (IMMUTABLE)</span>
                        <span class="layer-badge working">WORKING (EDITABLE)</span>
                    </div>
                    <p id="transcriptLayerSummary" class="muted-copy">No case loaded.</p>
                    <div id="transcriptLayerGrid" class="stack-list"></div>
                </section>
                <section class="rail-panel">
                    <div class="panel-header">
                        <p class="panel-label">System Health</p>
                        <button id="systemHealthRefresh" class="secondary-button" type="button">
                            Refresh
                        </button>
                    </div>
                    <div class="stack-list">
                        <span id="systemHealthBadge" class="status-pill" data-state="idle">
                            Health unknown
                        </span>
                        <p id="systemHealthSummary" class="muted-copy">
                            Diagnostics not loaded yet.
                        </p>
                        <div id="systemHealthDetails" class="stack-list"></div>
                    </div>
                </section>
            </aside>

            <div class="workspace-shell">
                <header class="workspace-header">
                    <div>
                        <p class="eyebrow">Production Workspace</p>
                        <h2 id="workspaceTitle">Stage 1: Intake</h2>
                    </div>
                    <div class="header-status">
                        <div class="status-card">
                            <span class="status-label">Mode</span>
                            <strong>Desktop Foundation</strong>
                        </div>
                        <button
                            id="themeToggle"
                            class="theme-toggle"
                            type="button"
                            aria-label="Toggle theme"
                        >
                            Toggle Theme
                        </button>
                    </div>
                </header>

                <section class="pipeline-shell">
                    <div class="pipeline-heading">
                        <span class="panel-label">Pipeline</span>
                        <span id="pipelineSummary" class="pipeline-summary">1 of 6</span>
                    </div>
                    <div id="pipelineIndicator" class="pipeline-indicator" aria-hidden="true"></div>
                </section>

                <main id="screenRoot" class="screen-root" aria-live="polite"></main>
            </div>
        </div>
        <div id="notificationToast" class="notification-toast" data-state="idle" hidden></div>

        <script src="assets/js/state.js"></script>
        <script src="assets/js/api.js"></script>
        <script src="assets/js/ui.js"></script>
        <script src="assets/js/router.js"></script>
        <script src="assets/js/transcript/confidence_highlighting.js"></script>
        <script src="assets/js/transcript/speaker_visualization.js"></script>
        <script src="assets/js/transcript/playback_sync.js"></script>
        <script src="assets/js/transcript/transcript_navigation.js"></script>
        <script src="assets/js/transcript/transcript_renderer.js"></script>
        <script src="assets/js/realtime/websocket_client.js"></script>
        <script src="assets/js/realtime/live_buffer.js"></script>
        <script src="assets/js/realtime/live_renderer.js"></script>
        <script src="assets/js/realtime/live_speakers.js"></script>
        <script src="assets/js/realtime/live_readback.js"></script>
        <script src="assets/js/realtime/live_diagnostics.js"></script>
        <script src="assets/js/review/issue_flags.js"></script>
        <script src="assets/js/review/review_queue.js"></script>
        <script src="assets/js/review/confidence_panel.js"></script>
        <script src="assets/js/review/speaker_review.js"></script>
        <script src="assets/js/review/audit_history.js"></script>
        <script src="assets/js/legal_review/exhibit_panel.js"></script>
        <script src="assets/js/legal_review/objections.js"></script>
        <script src="assets/js/legal_review/annotations.js"></script>
        <script src="assets/js/legal_review/interpreted_view.js"></script>
        <script src="assets/js/legal_review/legal_navigation.js"></script>
        <script src="assets/js/legal_review/review_dashboard.js"></script>
        <script src="assets/js/legal_review/issue_management.js"></script>
        <script src="assets/js/screens/stage_1.js"></script>
        <script src="assets/js/screens/stage_2.js"></script>
        <script src="assets/js/screens/stage_3.js"></script>
        <script src="assets/js/screens/stage_4.js"></script>
        <script src="assets/js/screens/stage_5.js"></script>
        <script src="assets/js/screens/stage_6.js"></script>
    </body>
</html>
